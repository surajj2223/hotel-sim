server:
  port: 8081

# PSP-016 / WAVE0_05 §7.2 — wire compose env vars into the typed property names
# our @Value lookups use. Defaults keep non-compose runs working (parity with
# spring.datasource above).
psp-sim:
  webhook-secret: ${PSP_WEBHOOK_SECRET:dev-webhook-secret}
  core-api-webhook-url: ${CORE_API_WEBHOOK_URL:http://core-api:8080/webhooks/psp}
  hosted-base-url: ${PSP_SIM_HOSTED_BASE_URL:http://payments-sim:8081}

spring:
  datasource:
    # Non-compose default per WAVE0_05 §7.4 — local Postgres reachable at 5433/pspsim.
    # Compose overrides host (and credentials) via SPRING_DATASOURCE_* env vars.
    url: jdbc:postgresql://localhost:5433/pspsim
    username: pspsim
    password: pspsim
    hikari:
      # Send String params as "unspecified" so Postgres native enum types accept them
      # — same idiom as core-api. Required for the psp_payment_status / psp_refund_status
      # enums introduced in V1.
      data-source-properties:
        stringtype: unspecified
  jpa:
    hibernate:
      ddl-auto: none          # Flyway owns the schema; Hibernate must not touch it
    open-in-view: false       # avoid lazy-load across HTTP boundary
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health      # expose only the health endpoint for the SCF-005 gate
  endpoint:
    health:
      show-details: never    # liveness/readiness rollup only; no internals leaked
