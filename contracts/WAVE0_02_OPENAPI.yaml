        amount:
          type: integer
          format: int64
          description: "Meaning per eventCode \u2014 see WAVE0_03 \xA73."
        currency:
          type: string
          minLength: 3
          maxLength: 3
        occurredAt:
          type: string
          format: date-time
        success:
