    requirement: Capture an authorised payment, full or partial; single capture only.
    acceptance: '202 PaymentResponse; second capture -> 409 (INV-005); amount > authorised -> 409 (SCH-032);
      ledger postings happen on the CAPTURE webhook, not here (INV-006); X-Human-Auth required else 428.

      '
    mapsTo:
    - SCH-032
    - INV-005
    - INV-006
    - INV-007
