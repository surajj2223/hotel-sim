# MERGED Stage 1 + Stage 2 (generated). Reports (API-016/017) are DRAFT — awaiting Desk freeze-flip (WAVE0_00 §1b).
openapi: 3.1.0
info:
  title: "Hospitality Operations Platform \u2014 core-api"
  version: 0.2.0-stage2
  description: 'The single body behind two heads (ops-web and the future MCP). This document is the contract
    both heads call. Stage 1 covers the customer + room-booking spine with no payment. Every endpoint
    here must fully serve ops-web; no endpoint exists for the agent alone.

    '
servers:
- url: http://localhost:8080
  description: Local core-api (docker-compose)
tags:
- name: customers
  description: Customer identity, contact, and preferences (SCH-001..004).
- name: products
  description: Bookable products; Stage 1 exposes room availability search (SCH-010/011).
- name: bookings
  description: Folios and their lines (SCH-020/021/022).
- name: payments
  description: Payment links, capture, cancel-auth (SCH-030..033). Human-gated writes (INV-007).
- name: webhooks
  description: Inbound PSP event sink (SCH-070/071); machine-to-machine, signature-authenticated.
- name: reports
  description: 'Financial read-backs (charter §9): revenue by vertical and the unpaid-bookings worklist
    (API-016/017). Read-only; serves ops-web + the future MCP''s financial interrogation. DRAFT.'
paths:
  /customers:
    post:
      operationId: createCustomer
      tags:
      - customers
      summary: Create a customer; server mints the opaque shopperReference (INV-001).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreateRequest'
      responses:
        '201':
          description: Customer created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /customers/{customerId}:
    get:
      operationId: getCustomer
      tags:
      - customers
      summary: Fetch a single customer by id.
      parameters:
      - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: The customer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /customers/{customerId}/preferences/{key}:
    put:
      operationId: setCustomerPreference
      tags:
      - customers
      summary: Upsert one preference value for a key (one value per key, SCH-004).
      parameters:
      - $ref: '#/components/parameters/CustomerId'
      - name: key
        in: path
        required: true
        schema:
          type: string
          example: floor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferenceValue'
      responses:
        '200':
          description: Preference upserted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferenceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /availability:
    get:
      operationId: searchAvailability
      tags:
      - products
      summary: Products available in a window, with vertical-specific attributes (roomAttributes for ROOM, null for other verticals).
      parameters:
      - name: vertical
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/Vertical'
        description: All registered verticals are supported; resolved via the vertical strategy registry. ROOM, SPA, and FNB are exercised; EVENT reserved for a later slice.
      - name: startsAt
        in: query
        required: true
        schema:
          type: string
          format: date-time
      - name: endsAt
        in: query
        required: true
        schema:
          type: string
          format: date-time
      - name: quantity
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      responses:
        '200':
          description: Matching products with computed availability for the window.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailabilityResult'
        '400':
          $ref: '#/components/responses/BadRequest'
  /bookings:
    post:
      operationId: createBooking
      tags:
      - bookings
      summary: Open an empty folio for a customer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
      responses:
        '201':
          description: Folio created (PENDING, no lines).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolioResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /bookings/{bookingId}/lines:
    post:
      operationId: addBookingLine
      tags:
      - bookings
      summary: 'Add a product line to a folio. Re-checks availability and price atomically at write time
        (INV-003); on stale state returns 409 with current availability.

        '
      parameters:
      - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingLineCreateRequest'
      responses:
        '201':
          description: Line added; folio totals recomputed (INV-004).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolioResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StateConflict'
  /bookings/{bookingId}:
    get:
      operationId: getFolio
      tags:
      - bookings
      summary: The folio with its lines and server-derived amounts (incl. balance).
      parameters:
      - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: The folio.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolioResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /bookings/{bookingId}/lines/{lineId}/complete:
    post:
      operationId: completeLine
      tags:
      - bookings
      summary: 'Mark a booking line rendered/done (ACTIVE -> COMPLETED). Ungated: posts
        nothing, moves no money (mirrors cancelLine). No folio side effect — completing a
        line never flips the booking.'
      parameters:
      - $ref: '#/components/parameters/BookingId'
      - $ref: '#/components/parameters/LineId'
      responses:
        '200':
          description: 'Line marked COMPLETED. Returns the folio; the line status reflects
            the change and the booking status is unchanged.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolioResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StateConflict'
  /bookings/{bookingId}/complete:
    post:
      operationId: completeFolio
      tags:
      - bookings
      summary: 'Close out a folio (CONFIRMED -> COMPLETED). Repercussive, INV-007 gated.
        Revalidates C1 (every non-CANCELLED line is COMPLETED) + C2 (customerOwes == 0,
        RX-003) atomically and fails loudly with current state. Idempotent on
        already-COMPLETED; CANCELLED/PENDING -> 409.'
      parameters:
      - $ref: '#/components/parameters/BookingId'
      - $ref: '#/components/parameters/HumanAuth'
      responses:
        '200':
          description: 'Folio completed (CONFIRMED -> COMPLETED), or already COMPLETED
            (idempotent success). Returns the folio.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolioResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/FolioNotCompletable'
        '428':
          $ref: '#/components/responses/HumanAuthRequired'
  /bookings/{bookingId}/payments:
    post:
      operationId: createPaymentLink
      tags:
      - payments
      summary: Create a payment (link) against a folio; PSP mints the paymentLinkId.
      parameters:
      - $ref: '#/components/parameters/BookingId'
      - $ref: '#/components/parameters/HumanAuth'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentLinkCreateRequest'
      responses:
        '201':
          description: Payment created (PENDING); paymentLinkId returned for the hosted page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StateConflict'
        '428':
          $ref: '#/components/responses/HumanAuthRequired'
    get:
      operationId: listBookingPayments
      tags:
      - payments
      summary: List all payments (and their refunds) on a folio. Read; not gated.
      parameters:
      - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Payments on the folio.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /payments/{paymentId}:
    get:
      operationId: getPayment
      tags:
      - payments
      summary: A single payment with amounts, status, references, and refunds.
      parameters:
      - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: The payment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /payments/{paymentId}/capture:
    post:
      operationId: capturePayment
      tags:
      - payments
      summary: Capture an authorised payment (full or partial). Single capture only (INV-005).
      parameters:
      - $ref: '#/components/parameters/PaymentId'
      - $ref: '#/components/parameters/HumanAuth'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureRequest'
      responses:
        '202':
          description: 'Capture requested at the PSP. Payment reflects the request; final state and ledger
            postings land on the CAPTURE webhook (INV-006). Returns the payment.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StateConflict'
        '428':
          $ref: '#/components/responses/HumanAuthRequired'
  /payments/{paymentId}/cancel:
    post:
      operationId: cancelAuthorisation
      tags:
      - payments
      summary: Cancel an uncaptured authorisation. No ledger effect (INV-006).
      parameters:
      - $ref: '#/components/parameters/PaymentId'
      - $ref: '#/components/parameters/HumanAuth'
      responses:
        '202':
          description: Cancellation requested; CANCELLATION webhook confirms. Returns payment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StateConflict'
        '428':
          $ref: '#/components/responses/HumanAuthRequired'
  /payments/{paymentId}/refunds:
    post:
      operationId: refundPayment
      tags:
      - payments
      summary: Refund part or all of a captured payment (child of the payment).
      parameters:
      - $ref: '#/components/parameters/PaymentId'
      - $ref: '#/components/parameters/HumanAuth'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
      responses:
        '202':
          description: 'Refund requested at the PSP (Refund PENDING). REFUND webhook (WHK-009) settles
            it and drives per-line REFUND_REVERSAL postings. Returns the refund.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StateConflict'
        '428':
          $ref: '#/components/responses/HumanAuthRequired'
  /webhooks/psp:
    post:
      operationId: receivePspWebhook
      tags:
      - webhooks
      summary: Inbound PSP event sink. Idempotent; signature-authenticated (WHK-014).
      parameters:
      - $ref: '#/components/parameters/PspSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PspWebhookEvent'
      responses:
        '200':
          description: "Event accepted (or recognised as a duplicate \u2014 WHK-005, same 200, no second\
            \ effect). Body acknowledges receipt.\n"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAck'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Missing or invalid X-PSP-Signature (WHK-014).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  # DRAFT (API-016) — awaiting Desk freeze-flip (WAVE0_00 §1b). Read-only, additive, no schema change.
  /reports/revenue:
    get:
      operationId: getRevenue
      tags:
      - reports
      summary: 'Revenue split by vertical over a window (charter §9). Read-only. gross = sum of REVENUE
        postings; refundedTotal = absolute value of the sum of REFUND_REVERSAL postings; net = gross -
        refundedTotal (a derived identity, never stored). Window is half-open [from, to) on posting time.
        All amounts minor units. groupBy is vertical only (no day / capture-mode variants — charter §9 minimal).'
      parameters:
      - name: from
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: 'Inclusive lower bound on posting time (half-open [from, to)).'
      - name: to
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: 'Exclusive upper bound on posting time (half-open [from, to)).'
      responses:
        '200':
          description: 'Revenue report for the window: per-vertical gross/refundedTotal/net plus totals.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueReport'
        '400':
          $ref: '#/components/responses/BadRequest'
  # DRAFT (API-017) — awaiting Desk freeze-flip (WAVE0_00 §1b). Read-only, additive, no schema change.
  /reports/unpaid-bookings:
    get:
      operationId: listUnpaidBookings
      tags:
      - reports
      summary: 'The full unpaid-bookings worklist (charter §9). Read-only, no params. Selection predicate:
        total_amount > amount_paid (the SQL form of customerOwes > 0, RX-003). Each booking carries its
        lines with per-line owed/posted/held breakdown. All amounts minor units.'
      responses:
        '200':
          description: 'Every booking with an outstanding customer balance, each with its line breakdown.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnpaidBookings'
components:
  parameters:
    CustomerId:
      name: customerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BookingId:
      name: bookingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PaymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LineId:
      name: lineId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    HumanAuth:
      name: X-Human-Auth
      in: header
      required: true
      schema:
        type: string
      description: 'INV-007 human-authorisation token. Present + non-blank = a human confirmed this repercussive
        write (ops-web click or agent "yes"). The caller cannot self-mint it. Absent/blank -> 428.

        '
    PspSignature:
      name: X-PSP-Signature
      in: header
      required: true
      schema:
        type: string
      description: "WHK-014 \u2014 HMAC over the raw request body with the shared PSP secret."
  responses:
    BadRequest:
      description: Malformed request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    StateConflict:
      description: 'Write-time revalidation failed: state moved since the caller''s last read (INV-003).
        Body carries current state so the caller can re-read and retry.

        '
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StateConflict'
    HumanAuthRequired:
      description: 'INV-007: a repercussive write was attempted without a human-authorisation signal.
        Maps to HTTP 428 Precondition Required (HumanAuthRequiredException).

        '
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    FolioNotCompletable:
      description: 'completeFolio rejected by write-time revalidation: C1 (a non-CANCELLED
        line is not yet COMPLETED) and/or C2 (customerOwes != 0, RX-003) failed, or the
        folio is in a terminal/ineligible state (CANCELLED or PENDING). No write occurred;
        the body carries the live state so ops-web/the agent can surface it and the caller
        can re-read and retry.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FolioCompletionConflict'
  schemas:
    Vertical:
      type: string
      enum:
      - ROOM
      - SPA
      - FNB
      - EVENT
      description: ENM-001. ROOM, SPA, and FNB are exercised; EVENT reserved for a later slice.
    BookingStatus:
      type: string
      enum:
      - PENDING
      - CONFIRMED
      - CANCELLED
      - COMPLETED
      description: ENM-002.
    BookingLineStatus:
      type: string
      enum:
      - ACTIVE
      - CANCELLED
      - COMPLETED
      description: ENM-003.
    ApiError:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: 'Customer not found: 3f2a...'
      description: Standard error envelope for 4xx/5xx.
    StateConflict:
      allOf:
      - $ref: '#/components/schemas/ApiError'
      - type: object
        properties:
          currentState:
            description: "Current truth at the moment the write was rejected \u2014 e.g. available capacity,\
              \ or the current price snapshot. Shape depends on what moved.\n"
            type: object
            additionalProperties: true
      description: Body of a 409 from INV-003 write-time revalidation.
    FolioCompletionState:
      type: object
      required:
      - status
      - customerOwes
      - incompleteLineIds
      properties:
        status:
          $ref: '#/components/schemas/BookingStatus'
          description: The booking's current status, unchanged by the rejected write.
        customerOwes:
          type: integer
          format: int64
          description: 'Live settlement figure (RX-003): max(0, totalAmount - amountPaid),
            minor units. C2 requires this to be 0.'
        incompleteLineIds:
          type: array
          items:
            type: string
            format: uuid
          description: 'C1: every non-CANCELLED line that is not yet COMPLETED (the ACTIVE
            stragglers). Empty when only C2 failed or on a terminal-state attempt.'
      description: 'currentState payload for a completeFolio 409 \u2014 names which condition
        failed and echoes the live truth.'
    FolioCompletionConflict:
      allOf:
      - $ref: '#/components/schemas/ApiError'
      - type: object
        properties:
          currentState:
            $ref: '#/components/schemas/FolioCompletionState'
      description: Body of a 409 from completeFolio revalidation or a terminal-state attempt.
    CustomerCreateRequest:
      type: object
      required:
      - fullName
      properties:
        fullName:
          type: string
          example: John Patel
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
      description: "shopperReference is NOT accepted here \u2014 the server mints it (INV-001).\n"
    CustomerResponse:
      type: object
      required:
      - id
      - shopperReference
      - fullName
      - createdAt
      properties:
        id:
          type: string
          format: uuid
        shopperReference:
          type: string
          readOnly: true
          example: SHPR-9f2c...
        fullName:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    PreferenceValue:
      type: object
      required:
      - value
      properties:
        value:
          type: string
          example: high
    PreferenceResponse:
      type: object
      required:
      - key
      - value
      properties:
        key:
          type: string
          example: floor
        value:
          type: string
          example: high
    AvailabilityResult:
      type: object
      required:
      - productId
      - vertical
      - name
      - unitPrice
      - currency
      - availableUnits
      properties:
        productId:
          type: string
          format: uuid
        vertical:
          $ref: '#/components/schemas/Vertical'
        name:
          type: string
          example: Deluxe King
        unitPrice:
          type: integer
          format: int64
          description: Per-unit price for the window, MINOR UNITS (pence). Snapshot basis.
          example: 18000
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: GBP
        availableUnits:
          type: integer
          description: Units free in the window after ACTIVE committed lines (INV-003 read).
          example: 3
        roomAttributes:
          type: object
          nullable: true
          properties:
            floorBand:
              type: string
              nullable: true
              example: HIGH
            bedType:
              type: string
              nullable: true
              example: KING
            quiet:
              type: boolean
              example: true
            maxOccupancy:
              type: integer
              example: 2
        spaAttributes:
          # AMENDMENT (Slice A4) FROZEN on Desk sign-off — additive, backward-compatible.
          # Vertical-specific attributes for SPA products, mirroring roomAttributes for ROOM.
          # Populated for SPA products, null for other verticals; roomAttributes stays null
          # for SPA. Existing ROOM responses are byte-identical. See WAVE0_00 §1b
          # (API-004 spaAttributes row).
          type: object
          nullable: true
          properties:
            treatmentKind:
              type: string
              example: MASSAGE_60
            durationMinutes:
              type: integer
              example: 60
            therapistGender:
              type: string
              nullable: true
              description: Optional preference target for therapist-gender matching (charter §5).
              example: FEMALE
            concurrentSlots:
              type: integer
              description: Parallel capacity per slot (inventory figure).
              example: 3
        fnbAttributes:
          # AMENDMENT (Slice A5) FROZEN on Desk sign-off — additive, backward-compatible. Vertical-specific
          # attributes for F&B (FNB) products, mirroring spaAttributes for SPA / roomAttributes
          # for ROOM. Populated for FNB products, null for other verticals; roomAttributes and
          # spaAttributes stay null for FNB. Existing ROOM/SPA responses are byte-identical. Raw
          # product_fnb config only (no cuisine/dietary — that would need a schema migration).
          # See WAVE0_00 §1b (API-004 fnbAttributes row).
          type: object
          nullable: true
          properties:
            servicePeriod:
              type: string
              description: Service period this F&B product is sold in.
              example: DINNER
            seatingMinutes:
              type: integer
              description: Table-turn duration in minutes.
              example: 120
            coversCapacity:
              type: integer
              description: Total covers available per service period (inventory figure).
              example: 40
    BookingCreateRequest:
      type: object
      required:
      - customerId
      properties:
        customerId:
          type: string
          format: uuid
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: GBP
    BookingLineCreateRequest:
      type: object
      required:
      - productId
      - startsAt
      - endsAt
      - quantity
      properties:
        productId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        quantity:
          type: integer
          minimum: 1
          example: 3
          description: nights / covers / seats
      description: 'Caller does NOT send price. The server re-snapshots the current price via the vertical
        strategy at write time (INV-003).

        '
    BookingLineResponse:
      type: object
      required:
      - id
      - productId
      - vertical
      - status
      - startsAt
      - endsAt
      - quantity
      - unitPrice
      - lineAmount
      - currency
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        vertical:
          $ref: '#/components/schemas/Vertical'
        status:
          $ref: '#/components/schemas/BookingLineStatus'
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
