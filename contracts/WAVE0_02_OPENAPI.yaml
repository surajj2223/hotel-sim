x-requirements:
  stage: 1
  status: FROZEN   # authoritative status in WAVE0_00 §1b; built-against (API-001..007, PR #6)
  items:
  - id: API-001
    requirement: Create customer; server mints shopperReference.
    acceptance: 201 with SHPR- prefixed shopperReference; request cannot set it (INV-001).
    mapsTo:
    - SCH-001
    - SCH-002
    - INV-001
  - id: API-002
    requirement: Fetch a customer by id.
    acceptance: 200 with CustomerResponse; 404 ApiError when absent.
    mapsTo:
    - SCH-001
  - id: API-003
    requirement: Upsert one preference value per key.
    acceptance: PUT is idempotent; second PUT same key overwrites value (SCH-004).
    mapsTo:
    - SCH-004
  - id: API-004
    requirement: Search availability for a window, for any supported vertical.
    acceptance: Returns availableUnits computed from ACTIVE committed lines via the vertical strategy
      registry; roomAttributes populated for ROOM products, null for other verticals; ROOM, SPA,
      and FNB exercised.
    amendment:
      slice: A4
      status: FROZEN on Desk sign-off (see WAVE0_00 §1b API-004 spaAttributes row)
      change: 'Additive, backward-compatible — nullable `spaAttributes` object on
        AvailabilityResult exposes SPA vertical-specific attributes (treatmentKind,
        durationMinutes, therapistGender, concurrentSlots), mirroring roomAttributes for ROOM.
        Populated for SPA products, null for other verticals; roomAttributes stays null for SPA.
        Existing ROOM responses are byte-identical; no required-field change; existing clients
        unaffected. Unblocks charter §5 therapist-gender preference matching over availability.'
    amendmentA5:
      slice: A5
      status: FROZEN on Desk sign-off (see WAVE0_00 §1b API-004 fnbAttributes row)
      change: 'Additive, backward-compatible — nullable `fnbAttributes` object on
        AvailabilityResult exposes F&B vertical-specific attributes (servicePeriod,
        seatingMinutes, coversCapacity), mirroring spaAttributes for SPA / roomAttributes for ROOM.
        Populated for FNB products, null for other verticals; roomAttributes and spaAttributes
        stay null for FNB. Existing ROOM/SPA responses are byte-identical; no required-field
        change; existing clients unaffected. Raw product_fnb config only — no cuisine/dietary
        (that would need a schema migration).'
    mapsTo:
    - SCH-010
    - SCH-011
    - SCH-012
    - SCH-013
    - INV-003
  - id: API-005
    requirement: Open an empty folio for a customer.
    acceptance: 201 PENDING folio, zero lines, all amounts 0.
    mapsTo:
    - SCH-020
  - id: API-006
    requirement: Add a room line; revalidate availability + price at write time.
    acceptance: '201 with recomputed totals (INV-004); 409 StateConflict carrying currentState when availability/price
      moved (INV-003).

      '
    mapsTo:
    - SCH-022
    - INV-003
    - INV-004
  - id: API-007
    requirement: Read a folio with lines and derived amounts.
    acceptance: 200 FolioResponse; balance == total - paid + refunded (SCH-021).
    mapsTo:
    - SCH-020
    - SCH-021
    - SCH-022
