      slice: S2
      status: FROZEN (Slice S2) — see WAVE0_00 §1b API-008 lineCoverage row
      change: 'Additive, backward-compatible — optional `lineCoverage` array on
        PaymentLinkCreateRequest exposes WHK-016 scoped payment->line allocation over HTTP.
        Omitted/empty preserves today''s folio-wide behaviour byte-identically (WHK-012).
