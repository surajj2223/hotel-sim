# MERGED Stage 1 + Stage 2 (generated). getRevenue deferred to Stage 6.
openapi: 3.1.0
info:
  title: "Hospitality Operations Platform \u2014 core-api"
  version: 0.2.0-stage2
  description: 'The single body behind two heads (ops-web and the future MCP). This document is the contract
    both heads call. Stage 1 covers the customer + room-booking spine with no payment. Every endpoint
    here must fully serve ops-web; no endpoint exists for the agent alone.

    '
servers:
- url: http://localhost:8080
  description: Local core-api (docker-compose)
tags:
- name: customers
  description: Customer identity, contact, and preferences (SCH-001..004).
- name: products
  description: Bookable products; Stage 1 exposes room availability search (SCH-010/011).
- name: bookings
  description: Folios and their lines (SCH-020/021/022).
- name: payments
  description: Payment links, capture, cancel-auth (SCH-030..033). Human-gated writes (INV-007).
- name: webhooks
  description: Inbound PSP event sink (SCH-070/071); machine-to-machine, signature-authenticated.
paths:
  /customers:
    post:
      operationId: createCustomer
      tags:
      - customers
      summary: Create a customer; server mints the opaque shopperReference (INV-001).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreateRequest'
      responses:
        '201':
          description: Customer created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /customers/{customerId}:
    get:
      operationId: getCustomer
      tags:
      - customers
      summary: Fetch a single customer by id.
      parameters:
      - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: The customer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /customers/{customerId}/preferences/{key}:
    put:
      operationId: setCustomerPreference
      tags:
      - customers
      summary: Upsert one preference value for a key (one value per key, SCH-004).
      parameters:
      - $ref: '#/components/parameters/CustomerId'
      - name: key
        in: path
        required: true
        schema:
          type: string
          example: floor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferenceValue'
      responses:
        '200':
          description: Preference upserted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferenceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /availability:
    get:
      operationId: searchAvailability
      tags:
      - products
      summary: Rooms available in a window, with attributes (floor band, quiet, bed type).
      parameters:
      - name: vertical
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/Vertical'
        description: Stage 1 supports ROOM only; other values reserved for later slices.
      - name: startsAt
        in: query
        required: true
        schema:
          type: string
          format: date-time
      - name: endsAt
        in: query
        required: true
        schema:
          type: string
          format: date-time
      - name: quantity
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      responses:
        '200':
          description: Matching products with computed availability for the window.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailabilityResult'
        '400':
          $ref: '#/components/responses/BadRequest'
  /bookings:
    post:
      operationId: createBooking
      tags:
      - bookings
      summary: Open an empty folio for a customer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
      responses:
        '201':
          description: Folio created (PENDING, no lines).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolioResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /bookings/{bookingId}/lines:
    post:
      operationId: addBookingLine
      tags:
      - bookings
      summary: 'Add a product line to a folio. Re-checks availability and price atomically at write time
        (INV-003); on stale state returns 409 with current availability.

        '
      parameters:
      - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingLineCreateRequest'
      responses:
        '201':
          description: Line added; folio totals recomputed (INV-004).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolioResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StateConflict'
  /bookings/{bookingId}:
    get:
      operationId: getFolio
      tags:
      - bookings
      summary: The folio with its lines and server-derived amounts (incl. balance).
      parameters:
      - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: The folio.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolioResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /bookings/{bookingId}/payments:
    post:
      operationId: createPaymentLink
      tags:
      - payments
      summary: Create a payment (link) against a folio; PSP mints the paymentLinkId.
      parameters:
      - $ref: '#/components/parameters/BookingId'
      - $ref: '#/components/parameters/HumanAuth'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentLinkCreateRequest'
      responses:
        '201':
          description: Payment created (PENDING); paymentLinkId returned for the hosted page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StateConflict'
        '428':
          $ref: '#/components/responses/HumanAuthRequired'
    get:
      operationId: listBookingPayments
      tags:
      - payments
      summary: List all payments (and their refunds) on a folio. Read; not gated.
      parameters:
      - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Payments on the folio.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /payments/{paymentId}:
    get:
      operationId: getPayment
      tags:
      - payments
      summary: A single payment with amounts, status, references, and refunds.
      parameters:
      - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: The payment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /payments/{paymentId}/capture:
    post:
      operationId: capturePayment
      tags:
      - payments
      summary: Capture an authorised payment (full or partial). Single capture only (INV-005).
      parameters:
      - $ref: '#/components/parameters/PaymentId'
      - $ref: '#/components/parameters/HumanAuth'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureRequest'
      responses:
        '202':
          description: 'Capture requested at the PSP. Payment reflects the request; final state and ledger
            postings land on the CAPTURE webhook (INV-006). Returns the payment.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StateConflict'
        '428':
          $ref: '#/components/responses/HumanAuthRequired'
  /payments/{paymentId}/cancel:
    post:
      operationId: cancelAuthorisation
      tags:
      - payments
      summary: Cancel an uncaptured authorisation. No ledger effect (INV-006).
      parameters:
      - $ref: '#/components/parameters/PaymentId'
      - $ref: '#/components/parameters/HumanAuth'
      responses:
        '202':
          description: Cancellation requested; CANCELLATION webhook confirms. Returns payment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StateConflict'
        '428':
          $ref: '#/components/responses/HumanAuthRequired'
  /payments/{paymentId}/refunds:
    post:
      operationId: refundPayment
      tags:
      - payments
      summary: Refund part or all of a captured payment (child of the payment).
      parameters:
      - $ref: '#/components/parameters/PaymentId'
      - $ref: '#/components/parameters/HumanAuth'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
      responses:
        '202':
          description: 'Refund requested at the PSP (Refund PENDING). REFUND webhook (WHK-009) settles
            it and drives per-line REFUND_REVERSAL postings. Returns the refund.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StateConflict'
        '428':
          $ref: '#/components/responses/HumanAuthRequired'
  /webhooks/psp:
    post:
      operationId: receivePspWebhook
      tags:
      - webhooks
      summary: Inbound PSP event sink. Idempotent; signature-authenticated (WHK-014).
      parameters:
      - $ref: '#/components/parameters/PspSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PspWebhookEvent'
      responses:
        '200':
          description: "Event accepted (or recognised as a duplicate \u2014 WHK-005, same 200, no second\
            \ effect). Body acknowledges receipt.\n"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAck'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Missing or invalid X-PSP-Signature (WHK-014).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
components:
  parameters:
    CustomerId:
      name: customerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BookingId:
      name: bookingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PaymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    HumanAuth:
      name: X-Human-Auth
      in: header
      required: true
      schema:
        type: string
      description: 'INV-007 human-authorisation token. Present + non-blank = a human confirmed this repercussive
        write (ops-web click or agent "yes"). The caller cannot self-mint it. Absent/blank -> 428.

        '
    PspSignature:
      name: X-PSP-Signature
      in: header
      required: true
      schema:
        type: string
      description: "WHK-014 \u2014 HMAC over the raw request body with the shared PSP secret."
  responses:
    BadRequest:
      description: Malformed request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    StateConflict:
      description: 'Write-time revalidation failed: state moved since the caller''s last read (INV-003).
        Body carries current state so the caller can re-read and retry.

        '
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StateConflict'
    HumanAuthRequired:
      description: 'INV-007: a repercussive write was attempted without a human-authorisation signal.
        Maps to HTTP 428 Precondition Required (HumanAuthRequiredException).

        '
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    Vertical:
      type: string
      enum:
      - ROOM
      - SPA
      - FNB
      - EVENT
      description: ENM-001. Stage 1 implements ROOM only.
    BookingStatus:
      type: string
      enum:
      - PENDING
      - CONFIRMED
      - CANCELLED
      - COMPLETED
      description: ENM-002.
    BookingLineStatus:
      type: string
      enum:
      - ACTIVE
      - CANCELLED
      - COMPLETED
      description: ENM-003.
    ApiError:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: 'Customer not found: 3f2a...'
      description: Standard error envelope for 4xx/5xx.
    StateConflict:
      allOf:
      - $ref: '#/components/schemas/ApiError'
      - type: object
        properties:
          currentState:
            description: "Current truth at the moment the write was rejected \u2014 e.g. available capacity,\
              \ or the current price snapshot. Shape depends on what moved.\n"
            type: object
            additionalProperties: true
      description: Body of a 409 from INV-003 write-time revalidation.
    CustomerCreateRequest:
      type: object
      required:
      - fullName
      properties:
        fullName:
          type: string
          example: John Patel
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
      description: "shopperReference is NOT accepted here \u2014 the server mints it (INV-001).\n"
    CustomerResponse:
      type: object
      required:
      - id
      - shopperReference
      - fullName
      - createdAt
      properties:
        id:
          type: string
          format: uuid
        shopperReference:
          type: string
          readOnly: true
          example: SHPR-9f2c...
        fullName:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    PreferenceValue:
      type: object
      required:
      - value
      properties:
        value:
          type: string
          example: high
    PreferenceResponse:
      type: object
      required:
      - key
      - value
      properties:
        key:
          type: string
          example: floor
        value:
          type: string
          example: high
    AvailabilityResult:
      type: object
      required:
      - productId
      - vertical
      - name
      - unitPrice
      - currency
      - availableUnits
      properties:
        productId:
          type: string
          format: uuid
        vertical:
          $ref: '#/components/schemas/Vertical'
        name:
          type: string
          example: Deluxe King
        unitPrice:
          type: integer
          format: int64
          description: Per-unit price for the window, MINOR UNITS (pence). Snapshot basis.
          example: 18000
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: GBP
        availableUnits:
          type: integer
          description: Units free in the window after ACTIVE committed lines (INV-003 read).
          example: 3
        roomAttributes:
          type: object
          nullable: true
          properties:
            floorBand:
              type: string
              nullable: true
              example: HIGH
            bedType:
              type: string
              nullable: true
              example: KING
            quiet:
              type: boolean
              example: true
            maxOccupancy:
              type: integer
              example: 2
    BookingCreateRequest:
      type: object
      required:
      - customerId
      properties:
        customerId:
          type: string
          format: uuid
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: GBP
    BookingLineCreateRequest:
      type: object
      required:
      - productId
      - startsAt
      - endsAt
      - quantity
      properties:
        productId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        quantity:
          type: integer
          minimum: 1
          example: 3
          description: nights / covers / seats
      description: 'Caller does NOT send price. The server re-snapshots the current price via the vertical
        strategy at write time (INV-003).

        '
    BookingLineResponse:
      type: object
      required:
      - id
      - productId
      - vertical
      - status
      - startsAt
      - endsAt
      - quantity
      - unitPrice
      - lineAmount
      - currency
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        vertical:
          $ref: '#/components/schemas/Vertical'
        status:
          $ref: '#/components/schemas/BookingLineStatus'
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        quantity:
          type: integer
        unitPrice:
          type: integer
          format: int64
          description: Minor units; snapshot.
        lineAmount:
          type: integer
          format: int64
          description: unitPrice * quantity, minor units (DB CHECK enforces equality).
        currency:
          type: string
          minLength: 3
          maxLength: 3
    FolioResponse:
      type: object
      required:
      - id
      - customerId
      - status
      - currency
      - totalAmount
      - amountPaid
      - amountRefunded
      - balance
      - lines
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/BookingStatus'
        currency:
          type: string
          minLength: 3
          maxLength: 3
        totalAmount:
          type: integer
          format: int64
          readOnly: true
          description: INV-004; minor units.
        amountPaid:
          type: integer
          format: int64
          readOnly: true
          description: INV-004; 0 until Stage 2.
        amountRefunded:
          type: integer
          format: int64
          readOnly: true
          description: INV-004.
        balance:
          type: integer
          format: int64
          readOnly: true
          description: 'Derived: totalAmount - amountPaid + amountRefunded (SCH-021). Paid == balance
            0.'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/BookingLineResponse'
    CaptureMode:
      type: string
      enum:
      - IMMEDIATE
      - MANUAL
      description: ENM-004. Defaulted by the vertical strategy; overridable per payment.
    PaymentStatus:
      type: string
      enum:
      - PENDING
      - AUTHORISED
      - CAPTURED
      - CAPTURE_FAILED
      - CANCELLED
      - AUTH_EXPIRED
      - PARTIALLY_REFUNDED
      - REFUNDED
      - FAILED
      description: ENM-005.
    RefundStatus:
      type: string
      enum:
      - PENDING
      - REFUNDED
      - REFUND_FAILED
      description: ENM-006.
    PspEventCode:
      type: string
      enum:
      - AUTHORISATION
      - CAPTURE
      - CAPTURE_FAILED
      - CANCELLATION
      - REFUND
      - REFUND_FAILED
      - AUTH_EXPIRY
      description: ENM-007. Full payload contract in WAVE0_03.
    PaymentLinkCreateRequest:
      type: object
      required:
      - amount
      properties:
        amount:
          type: integer
          format: int64
          description: Amount to request, minor units. Typically the folio balance.
          example: 70000
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: GBP
        captureMode:
          allOf:
          - $ref: '#/components/schemas/CaptureMode'
          description: 'Optional override. Omitted -> defaulted from the booking''s vertical strategy
            (Rooms MANUAL, F&B IMMEDIATE). merchantReference is server-minted (not accepted).

            '
    PaymentResponse:
      type: object
      required:
      - id
      - bookingId
      - status
      - captureMode
      - currency
      - amountRequested
      - amountAuthorised
      - amountCaptured
      - amountRefunded
      - merchantReference
      - createdAt
      properties:
        id:
          type: string
          format: uuid
        bookingId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/PaymentStatus'
        captureMode:
          $ref: '#/components/schemas/CaptureMode'
        currency:
          type: string
          minLength: 3
          maxLength: 3
        amountRequested:
          type: integer
          format: int64
        amountAuthorised:
          type: integer
          format: int64
          description: 0 until AUTHORISATION webhook.
        amountCaptured:
          type: integer
          format: int64
          description: 0 until CAPTURE (INV-006).
        amountRefunded:
          type: integer
          format: int64
        shopperReference:
          type: string
          readOnly: true
          description: Copied from customer; opaque.
        merchantReference:
          type: string
          readOnly: true
          description: Server-minted reconciliation anchor (SCH-031).
        pspReference:
          type: string
          nullable: true
          readOnly: true
          description: PSP-minted on AUTHORISATION.
        paymentLinkId:
          type: string
          nullable: true
          readOnly: true
          description: PSP-minted on link creation.
        authExpiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        refunds:
          type: array
          items:
            $ref: '#/components/schemas/RefundResponse'
    CaptureRequest:
      type: object
      properties:
        amount:
          type: integer
          format: int64
          nullable: true
          description: 'Minor units to capture. Omitted = full (capture amountAuthorised). Must be <=
            amountAuthorised (SCH-032). Single capture only (INV-005).

            '
          example: 54000
    RefundRequest:
      type: object
      required:
      - amount
      properties:
        amount:
          type: integer
          format: int64
          description: Minor units to refund. Must be <= (captured - alreadyRefunded) (SCH-033).
          example: 6000
        reason:
          type: string
          nullable: true
          example: "Goodwill \u2014 late check-in"
    RefundResponse:
      type: object
      required:
      - id
      - paymentId
      - amount
      - currency
      - status
      - merchantReference
      - originalReference
      - createdAt
      properties:
        id:
          type: string
          format: uuid
        paymentId:
          type: string
          format: uuid
        amount:
          type: integer
          format: int64
        currency:
          type: string
          minLength: 3
          maxLength: 3
        status:
          $ref: '#/components/schemas/RefundStatus'
        merchantReference:
          type: string
          readOnly: true
        pspReference:
          type: string
          nullable: true
          readOnly: true
          description: PSP-minted on REFUND webhook.
        originalReference:
          type: string
          readOnly: true
          description: Parent payment's pspReference (chain).
        reason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    PspWebhookEvent:
      type: object
      required:
      - eventId
      - eventCode
      - idempotencyKey
      - merchantReference
      - amount
      - currency
      - occurredAt
      - success
      properties:
        eventId:
          type: string
          description: PSP's id for this event delivery.
        eventCode:
          $ref: '#/components/schemas/PspEventCode'
        idempotencyKey:
          type: string
          description: Stable across redeliveries (WHK-003); dedupe key (SCH-071).
        merchantReference:
          type: string
          description: Matches a Payment (WHK-004).
        pspReference:
          type: string
          nullable: true
          description: Present from AUTHORISATION onward.
        amount:
          type: integer
          format: int64
          description: "Meaning per eventCode \u2014 see WAVE0_03 \xA73."
        currency:
          type: string
          minLength: 3
          maxLength: 3
        occurredAt:
          type: string
          format: date-time
        success:
          type: boolean
          description: false for *_FAILED variants.
        authExpiresAt:
          type: string
          format: date-time
          nullable: true
          description: AUTHORISATION only.
        originalReference:
          type: string
          nullable: true
          description: REFUND / REFUND_FAILED only.
        refundMerchantReference:
          type: string
          nullable: true
