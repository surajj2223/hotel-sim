spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hotelops
    username: hotelops
    password: hotelops
    hikari:
      # Pass stringtype=unspecified so the Postgres JDBC driver sends String parameters
      # as "unspecified" type, enabling implicit casting to Postgres native enum types
      # (e.g. vertical, booking_status, etc.)  — required for Hibernate 6 + Postgres enums
      data-source-properties:
        stringtype: unspecified
  jpa:
    hibernate:
      ddl-auto: none          # Flyway owns the schema; Hibernate must not touch it
    open-in-view: false       # avoid lazy-load across HTTP boundary
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# PSP-001..004 / WAVE0_05 §7.2 — outbound payments-sim wiring. Compose overrides host/key
# via PAYMENTS_SIM_BASE_URL / PSP_API_KEY env; localhost default keeps non-compose runs working.
payments-sim:
  base-url: ${PAYMENTS_SIM_BASE_URL:http://localhost:8081}
  api-key: ${PSP_API_KEY:dev-psp-api-key}

management:
  endpoints:
    web:
      exposure:
        include: health      # expose only the health endpoint for the Wave 0 gate
  endpoint:
    health:
      show-details: never    # liveness/readiness rollup only; no internals leaked
